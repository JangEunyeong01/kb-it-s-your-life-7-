<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Basic 실습 통합</title>
    <style>
        /* 6페이지: 그래디언트 효과를 위한 기본 스타일 */
        body { min-height: 100vh; margin: 0; }
        .gradient-box { height: 2px; }
    </style>
    <script>
        window.onload = function() {
            // --- 2페이지: getElementById를 이용한 선택 [cite: 18, 24] ---
            const header2 = document.getElementById('header');
            if(header2) {
                header2.textContent = 'From JavaScript';
                header2.style.color = 'orange';
                header2.style.backgroundColor = 'red';
            }

            // --- 3페이지: querySelector()를 이용한 선택 [cite: 31, 44] ---
            // const header3 = document.querySelector('h1');
            // header3.textContent = 'From JavaScript';

            // --- 4페이지: querySelectorAll()과 for 루프 [cite: 54, 55, 71] ---
            const headers = document.querySelectorAll('.header-group');
            headers.forEach(function(header) {
                header.textContent = 'From JavaScript';
            });

            // --- 5페이지: innerHTML vs textContent [cite: 78, 79, 108] ---
            const output1 = document.getElementById('output1');
            const output2 = document.getElementById('output2');
            if(output1 && output2) {
                output1.textContent = '<h1>Header - 0</h1>'; // 단순 텍스트 [cite: 78]
                output2.innerHTML = '<h1>Header - 0</h1>';   // HTML 태그 적용 [cite: 79]
            }

            // --- 6페이지: style 속성으로 그래디언트 효과 [cite: 124, 125] ---
            /* for (let i = 0; i < 256; i++) {
                const div = document.createElement('div');
                div.style.height = '2px';
                div.style.backgroundColor = `rgb(${i}, ${i}, ${i})`;
                document.body.appendChild(div);
            }
            */

            // --- 7페이지: 속성(src) 변경 [cite: 140, 147, 150] ---
            const img = document.getElementById('image');
            if(img) {
                img.src = 'https://via.placeholder.com/300x200'; // 이미지 소스 교체 [cite: 140]
            }

            // --- 8페이지: 사용자 정의 속성(data-*) 추출 [cite: 154, 164] ---
            const bodyCustom = document.body.getAttribute('data-custom');
            // alert(bodyCustom); // 실습 시 주석 해제하여 확인 [cite: 163, 167]

            // --- 9페이지: 1초마다 현재 시간 출력 (시계) [cite: 170, 177, 188] ---
            const clock = document.getElementById('clock');
            setInterval(function() {
                if(clock) clock.textContent = new Date().toString();
            }, 1000);

            // --- 10페이지: 전통적 이벤트 모델 [cite: 192, 205, 208] ---
            const btn = document.getElementById('button-click');
            if(btn) {
                btn.onclick = function() {
                    alert('click');
                };
            }

            // --- 11페이지: 기본 이벤트 방지 (link 이동 막기) [cite: 215, 216] ---
            const linkBtn = document.getElementById('link-button');
            if(linkBtn) {
                linkBtn.onclick = function(event) {
                    alert('이동이 중단되었습니다.');
                    return false; // 또는 event.preventDefault(); 
                };
            }
        };
    </script>
</head>
<body data-custom="value"> <h2>2~3페이지: 단일 선택</h2>
    <h1 id="header">Header</h1>

    <hr>

    <h2>4페이지: 다중 선택 (All)</h2>
    <h1 class="header-group">Header</h1>
    <h1 class="header-group">Header</h1>
    <h1 class="header-group">Header</h1>

    <hr>

    <h2>5페이지: 제어 (Text vs HTML)</h2>
    <div id="output1"></div>
    <div id="output2"></div>

    <hr>

    <h2>7페이지: 속성 제어</h2>
    <img id="image" alt="test image">

    <hr>

    <h2>9페이지: 디지털 시계</h2>
    <h1 id="clock"></h1>

    <hr>

    <h2>10페이지: 이벤트 발생</h2>
    <button id="button-click">버튼</button>

    <hr>

    <h2>11페이지: 기본 이벤트 제거</h2>
    <a id="link-button" href="https://www.naver.com">네이버로 이동(막힘)</a>

</body>
</html>
